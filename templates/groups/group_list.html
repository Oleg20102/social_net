{% extends "base.html" %}
{% block title %}Групи{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="neon-text m-0">Групи</h2>

    <a href="{% url 'create_group' %}" class="btn-future">
        + Створити групу
    </a>
</div>
{% for group in groups %}
    <div class="post-card">
        <h4>{{ group.name }}</h4>
        <p>{{ group.description }}</p>
        <a href="{% url 'group_detail' group.slug %}" class="btn-future">
            Відкрити
        </a>
    </div>
{% empty %}
    <p>Поки що немає груп</p>
{% endfor %}
{% endblock %}
