{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Social{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="app-bg">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 py-3">
    <div class="container-fluid p-0">

      <a class="navbar-brand fw-bold" href="{% url 'home' %}">Social</a>

      <div class="ms-auto d-flex gap-2 align-items-center">
        {% if request.user.is_authenticated %}
          <a class="nav-link text-info fw-semibold" href="{% url 'profile' request.user.username %}">
            @{{ request.user.username }}
          </a>

          <a class="btn btn-outline-info btn-sm" href="{% url 'chat_inbox' %}">Чати</a>

          <a class="btn btn-success mt-2" href="{% url 'group_list' %}">Групи</a>

          <form method="post" action="{% url 'logout' %}" class="m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm">Вийти</button>
          </form>
          
        {% else %}
          <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Увійти</a>
          <a class="btn btn-info btn-sm text-dark fw-semibold" href="{% url 'register' %}">Реєстрація</a>
        {% endif %}
      </div>

    </div>
    
  </nav>

<main class="container py-4">
    <div class="glass p-4 fade-in">
        {% block content %}{% endblock %}
    </div>
</main>
</body>
</html>
